<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #333; }
      .stagename { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #fff; font-weight: 600; }
      .stagelabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #333; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #666; }
      .typelabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #888; font-style: italic; }
      .caption { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #666; }
      .roundlabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #666; font-weight: 600; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" class="title">Checkpoint Consensus Protocol</text>
  
  <!-- Outer box: Checkpoint Round -->
  <rect x="15" y="45" width="1170" height="165" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="65" class="roundlabel">CHECKPOINT ROUND</text>
  
  <!-- Stage 1: COMMIT (blue - #4a90d9) -->
  <g transform="translate(50, 75)">
    <rect x="0" y="0" width="170" height="120" rx="8" fill="#f0f7ff" stroke="#4a90d9" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="32" rx="8" fill="#4a90d9"/>
    <rect x="0" y="24" width="170" height="8" fill="#4a90d9"/>
    <text x="85" y="22" text-anchor="middle" class="stagename">COMMIT</text>
    <text x="85" y="52" text-anchor="middle" class="stagelabel">Collect pending</text>
    <text x="85" y="66" text-anchor="middle" class="stagelabel">operations</text>
    <text x="85" y="86" text-anchor="middle" class="desc">from local queues</text>
    <text x="85" y="108" text-anchor="middle" class="typelabel">(local)</text>
  </g>
  
  <!-- Arrow 1→2 -->
  <line x1="230" y1="135" x2="260" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 2: SUBMIT (teal) -->
  <g transform="translate(270, 75)">
    <rect x="0" y="0" width="170" height="120" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="32" rx="8" fill="#14b8a6"/>
    <rect x="0" y="24" width="170" height="8" fill="#14b8a6"/>
    <text x="85" y="22" text-anchor="middle" class="stagename">SUBMIT</text>
    <text x="85" y="52" text-anchor="middle" class="stagelabel">Broadcast</text>
    <text x="85" y="66" text-anchor="middle" class="stagelabel">operations</text>
    <text x="85" y="86" text-anchor="middle" class="desc">to other writers</text>
    <text x="85" y="108" text-anchor="middle" class="typelabel">(network)</text>
  </g>
  
  <!-- Arrow 2→3 -->
  <line x1="450" y1="135" x2="480" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 3: MERGE (amber) -->
  <g transform="translate(490, 75)">
    <rect x="0" y="0" width="170" height="120" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="32" rx="8" fill="#f59e0b"/>
    <rect x="0" y="24" width="170" height="8" fill="#f59e0b"/>
    <text x="85" y="22" text-anchor="middle" class="stagename">MERGE</text>
    <text x="85" y="52" text-anchor="middle" class="stagelabel">Unify operations</text>
    <text x="85" y="66" text-anchor="middle" class="stagelabel">from all writers</text>
    <text x="85" y="86" text-anchor="middle" class="desc">into single set</text>
    <text x="85" y="108" text-anchor="middle" class="typelabel">(local)</text>
  </g>
  
  <!-- Arrow 3→4 -->
  <line x1="670" y1="135" x2="700" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 4: COMPARE (orange) -->
  <g transform="translate(710, 75)">
    <rect x="0" y="0" width="170" height="120" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="32" rx="8" fill="#f97316"/>
    <rect x="0" y="24" width="170" height="8" fill="#f97316"/>
    <text x="85" y="22" text-anchor="middle" class="stagename">COMPARE</text>
    <text x="85" y="52" text-anchor="middle" class="stagelabel">Verify all writers</text>
    <text x="85" y="66" text-anchor="middle" class="stagelabel">have same set</text>
    <text x="85" y="86" text-anchor="middle" class="desc">ensure agreement</text>
    <text x="85" y="108" text-anchor="middle" class="typelabel">(network)</text>
  </g>
  
  <!-- Arrow 4→5 -->
  <line x1="890" y1="135" x2="920" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 5: SEAL (rose) -->
  <g transform="translate(930, 75)">
    <rect x="0" y="0" width="170" height="120" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="32" rx="8" fill="#f43f5e"/>
    <rect x="0" y="24" width="170" height="8" fill="#f43f5e"/>
    <text x="85" y="22" text-anchor="middle" class="stagename">SEAL</text>
    <text x="85" y="52" text-anchor="middle" class="stagelabel">Sign checkpoint</text>
    <text x="85" y="66" text-anchor="middle" class="stagelabel">exchange sigs</text>
    <text x="85" y="86" text-anchor="middle" class="desc">finalize checkpoint</text>
    <text x="85" y="108" text-anchor="middle" class="typelabel">(network)</text>
  </g>
  
  <!-- Result: Checkpoint Finalized -->
  <g transform="translate(600, 240)">
    <rect x="-100" y="0" width="200" height="32" rx="6" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
    <text x="0" y="21" text-anchor="middle" class="stagename" fill="#fff">CHECKPOINT FINALIZED</text>
  </g>
  
  <!-- Arrow from SEAL to result -->
  <line x1="1015" y1="195" x2="1015" y2="256" stroke="#888" stroke-width="2"/>
  <line x1="1015" y1="256" x2="700" y2="256" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Caption -->
  <text x="600" y="300" text-anchor="middle" class="caption">Writers coordinate through five stages to produce a finalized checkpoint at each interval.</text>
</svg>
