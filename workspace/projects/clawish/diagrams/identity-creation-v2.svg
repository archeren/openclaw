<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; fill: #333; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #fff; font-weight: 500; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #666; }
      .step { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #333; font-weight: 600; }
      .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="35" class="title" text-anchor="middle">Identity Creation Flow</text>
  
  <!-- LOCAL Column -->
  <rect x="50" y="70" width="220" height="220" rx="10" fill="#fff5f0" stroke="#d9704a" stroke-width="2"/>
  <text x="160" y="95" class="subtitle" text-anchor="middle">LOCAL</text>
  
  <!-- LOCAL Step 1 -->
  <rect x="70" y="115" width="180" height="50" rx="6" fill="#d9704a" stroke="#a0502c" stroke-width="2"/>
  <text x="160" y="140" class="label" text-anchor="middle">Generate</text>
  <text x="160" y="155" class="label" text-anchor="middle">keypair</text>
  
  <!-- LOCAL Step 2 -->
  <rect x="70" y="225" width="180" height="50" rx="6" fill="#e4a07e" stroke="#a0502c" stroke-width="2"/>
  <text x="160" y="250" class="label" text-anchor="middle">Sign</text>
  <text x="160" y="265" class="label" text-anchor="middle">request</text>
  
  <!-- Arrow within LOCAL -->
  <line x1="160" y1="165" x2="160" y2="225" class="arrow"/>
  
  <!-- L2 EMERGE Column -->
  <rect x="340" y="70" width="220" height="220" rx="10" fill="#f5fff0" stroke="#6b8e23" stroke-width="2"/>
  <text x="450" y="95" class="subtitle" text-anchor="middle">L2 EMERGE</text>
  
  <!-- L2 Step 1 -->
  <rect x="360" y="115" width="180" height="50" rx="6" fill="#6b8e23" stroke="#556b2f" stroke-width="2"/>
  <text x="450" y="140" class="label" text-anchor="middle">Emerge</text>
  <text x="450" y="155" class="label" text-anchor="middle">Register</text>
  
  <!-- L2 Step 2 -->
  <rect x="360" y="225" width="180" height="50" rx="6" fill="#8fbc8f" stroke="#556b2f" stroke-width="2"/>
  <text x="450" y="250" class="label" text-anchor="middle">Verify &amp;</text>
  <text x="450" y="265" class="label" text-anchor="middle">Promote</text>
  
  <!-- Arrow within L2 -->
  <line x1="450" y1="165" x2="450" y2="225" class="arrow"/>
  
  <!-- L1 REGISTRY Column -->
  <rect x="630" y="70" width="220" height="220" rx="10" fill="#f0f7ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="740" y="95" class="subtitle" text-anchor="middle">L1 REGISTRY</text>
  
  <!-- L1 Step 1 -->
  <rect x="650" y="115" width="180" height="50" rx="6" fill="#4a90d9" stroke="#2c5aa0" stroke-width="2"/>
  <text x="740" y="140" class="label" text-anchor="middle">Write</text>
  <text x="740" y="155" class="label" text-anchor="middle">to Ledger</text>
  
  <!-- L1 Step 2 -->
  <rect x="650" y="225" width="180" height="50" rx="6" fill="#7eb8e4" stroke="#4a90d9" stroke-width="2"/>
  <text x="740" y="250" class="label" text-anchor="middle">Clawfile</text>
  <text x="740" y="265" class="label" text-anchor="middle">Create</text>
  
  <!-- Arrow within L1 -->
  <line x1="740" y1="165" x2="740" y2="225" class="arrow"/>
  
  <!-- Arrows between columns -->
  <line x1="270" y1="140" x2="340" y2="140" class="arrow" stroke-dasharray="6,3"/>
  <line x1="560" y1="140" x2="630" y2="140" class="arrow" stroke-dasharray="6,3"/>
  
  <!-- Bottom labels -->
  <text x="160" y="325" class="subtitle" text-anchor="middle">Local System</text>
  <text x="450" y="325" class="subtitle" text-anchor="middle">L2 Node (Emerge)</text>
  <text x="740" y="325" class="subtitle" text-anchor="middle">L1 Registry</text>
</svg>