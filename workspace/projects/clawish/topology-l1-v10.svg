<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #333; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #fff; font-weight: 500; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #666; }
      .nodetitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #888; font-weight: 600; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
    <marker id="peerArrowStart" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L9,6 L0,3 z" fill="#27ae60"/>
    </marker>
    <marker id="peerArrowEnd" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="390" y="35" class="title" text-anchor="middle">Layer 1 Network Topology</text>
  <text x="390" y="55" class="subtitle" text-anchor="middle">Hub-and-Spoke Mesh Architecture</text>
  
  <!-- Hub Circle (Writers in center) -->
  <circle cx="200" cy="220" r="100" fill="none" stroke="#4a90d9" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="200" y="340" class="nodetitle" text-anchor="middle">Consensus Mesh</text>
  
  <!-- Writer Nodes (Hubs - in center circle) -->
  <text x="200" y="105" class="nodetitle" text-anchor="middle">Writer Nodes (Hubs)</text>
  
  <circle cx="200" cy="170" r="35" fill="#4a90d9" stroke="#2c5aa0" stroke-width="2"/>
  <text x="200" y="175" class="label" text-anchor="middle">Writer 1</text>
  
  <circle cx="145" cy="250" r="35" fill="#4a90d9" stroke="#2c5aa0" stroke-width="2"/>
  <text x="145" y="255" class="label" text-anchor="middle">Writer 2</text>
  
  <circle cx="255" cy="250" r="35" fill="#4a90d9" stroke="#2c5aa0" stroke-width="2"/>
  <text x="255" y="255" class="label" text-anchor="middle">Writer 3</text>
  
  <!-- Consensus connections between writers (all straight lines) -->
  <line x1="175" y1="200" x2="165" y2="225" stroke="#2c5aa0" stroke-width="2"/>
  <line x1="225" y1="200" x2="235" y2="225" stroke="#2c5aa0" stroke-width="2"/>
  <line x1="175" y1="250" x2="225" y2="250" stroke="#2c5aa0" stroke-width="2"/>
  
  <!-- Query Nodes (Spokes - around the outside, more spacing) -->
  <text x="550" y="105" class="nodetitle" text-anchor="middle">Query Nodes (Spokes)</text>
  
  <circle cx="480" cy="150" r="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="2"/>
  <text x="480" y="155" class="label" text-anchor="middle" fill="#1a5276">Query 1</text>
  
  <circle cx="620" cy="150" r="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="2"/>
  <text x="620" y="155" class="label" text-anchor="middle" fill="#1a5276">Query 2</text>
  
  <circle cx="480" cy="290" r="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="2"/>
  <text x="480" y="295" class="label" text-anchor="middle" fill="#1a5276">Query 3</text>
  
  <circle cx="620" cy="290" r="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="2"/>
  <text x="620" y="295" class="label" text-anchor="middle" fill="#1a5276">Query 4</text>
  
  <!-- Sync arrows from Writers to Queries -->
  <line x1="235" y1="170" x2="445" y2="150" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="235" y1="170" x2="585" y2="150" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="235" y1="260" x2="445" y2="290" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="235" y1="260" x2="585" y2="290" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  
  <!-- Peer sync between Query nodes (green bidirectional with opposite arrows) -->
  <!-- Horizontal: Q1 <-> Q2 -->
  <line x1="515" y1="150" x2="585" y2="150" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#peerArrowEnd)" marker-start="url(#peerArrowStart)"/>
  <!-- Vertical left: Q1 <-> Q3 -->
  <line x1="480" y1="185" x2="480" y2="255" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#peerArrowEnd)" marker-start="url(#peerArrowStart)"/>
  <!-- Vertical right: Q2 <-> Q4 -->
  <line x1="620" y1="185" x2="620" y2="255" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#peerArrowEnd)" marker-start="url(#peerArrowStart)"/>
  <!-- Horizontal bottom: Q3 <-> Q4 -->
  <line x1="515" y1="290" x2="585" y2="290" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#peerArrowEnd)" marker-start="url(#peerArrowStart)"/>
  
  <!-- Labels -->
  <text x="340" y="130" class="subtitle" text-anchor="middle" fill="#4a90d9">sync</text>
  <text x="550" y="220" class="subtitle" text-anchor="middle" fill="#27ae60">peer sync</text>
  
  <!-- Legend (with padding and margin from right edge) -->
  <rect x="720" y="180" width="90" height="120" rx="6" fill="#f8f9fa" stroke="#e0e0e0"/>
  <text x="765" y="200" class="nodetitle" text-anchor="middle">Legend</text>
  <circle cx="740" cy="220" r="10" fill="#4a90d9"/>
  <text x="760" y="224" class="subtitle" text-anchor="start" font-size="10">Writers</text>
  <circle cx="740" cy="245" r="10" fill="#7eb8e4"/>
  <text x="760" y="249" class="subtitle" text-anchor="start" font-size="10">Queries</text>
  <line x1="735" y1="265" x2="750" y2="265" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="760" y="269" class="subtitle" text-anchor="start" font-size="10">sync</text>
  <line x1="735" y1="282" x2="750" y2="282" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="760" y="286" class="subtitle" text-anchor="start" font-size="10">peer</text>
</svg>