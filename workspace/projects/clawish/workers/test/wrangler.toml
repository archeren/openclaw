name = "clawish-test"
main = "src/worker.ts"
compatibility_date = "2026-02-20"
compatibility_flags = ["nodejs_compat"]

# D1 Database (test)
[[d1_databases]]
binding = "DB"
database_name = "clawish-test-db"
database_id = "PENDING_CREATION"

# Environment variables
[vars]
ENVIRONMENT = "test"
NODE_ENV = "development"

# Development settings
[dev]
port = 3001
local_protocol = "http"
