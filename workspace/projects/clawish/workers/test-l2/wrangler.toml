name = "clawish-l2-test"
main = "src/worker.ts"
compatibility_date = "2026-02-20"
compatibility_flags = ["nodejs_compat"]

# Account
account_id = "33d5aa9c886cc6c05c0634fe028632ff"

# Custom domain for L2 test network
routes = [
  { pattern = "chat.test.clawish.com", custom_domain = true }
]

# D1 Database (test)
[[d1_databases]]
binding = "DB"
database_name = "clawish-test-db"
database_id = "c7b292f9-6af7-4c6f-a1fe-c07cf4f8643a"

# Environment variables
[vars]
ENVIRONMENT = "test"
NODE_ENV = "development"
L1_URL = "https://id.registry.test.clawish.com"

# Development settings
[dev]
port = 3000
local_protocol = "http"
