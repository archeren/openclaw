<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #333; }
      .label { font-family: monospace; font-size: 11px; fill: #fff; font-weight: 600; }
      .hashlabel { font-family: monospace; font-size: 10px; fill: #fff; }
      .rootlabel { font-family: monospace; font-size: 11px; fill: #fff; font-weight: 600; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #666; }
      .actorA { fill: #4a90d9; }
      .actorB { fill: #10b981; }
      .actorC { fill: #f97316; }
      .node { fill: #6366f1; }
      .root { fill: #8b5cf6; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Merkle Tree Aggregation</text>
  
  <!-- Level labels -->
  <text x="30" y="350" class="subtitle">Entries</text>
  <text x="30" y="250" class="subtitle">Hashes</text>
  <text x="30" y="150" class="subtitle">Root</text>
  
  <!-- Leaf nodes (entries) -->
  <!-- Entry A1 -->
  <rect x="60" y="320" width="60" height="40" rx="4" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
  <text x="90" y="345" text-anchor="middle" class="label">A1</text>
  
  <!-- Entry B1 -->
  <rect x="140" y="320" width="60" height="40" rx="4" class="actorB" stroke="#059669" stroke-width="1"/>
  <text x="170" y="345" text-anchor="middle" class="label">B1</text>
  
  <!-- Entry A2 -->
  <rect x="220" y="320" width="60" height="40" rx="4" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
  <text x="250" y="345" text-anchor="middle" class="label">A2</text>
  
  <!-- Entry C1 -->
  <rect x="300" y="320" width="60" height="40" rx="4" class="actorC" stroke="#ea580c" stroke-width="1"/>
  <text x="330" y="345" text-anchor="middle" class="label">C1</text>
  
  <!-- Entry B2 -->
  <rect x="380" y="320" width="60" height="40" rx="4" class="actorB" stroke="#059669" stroke-width="1"/>
  <text x="410" y="345" text-anchor="middle" class="label">B2</text>
  
  <!-- Entry A3 -->
  <rect x="460" y="320" width="60" height="40" rx="4" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
  <text x="490" y="345" text-anchor="middle" class="label">A3</text>
  
  <!-- Continuation -->
  <text x="550" y="345" font-family="Arial, sans-serif" font-size="18" fill="#888">⋯</text>
  
  <!-- Level 1 hashes -->
  <!-- H1 from A1, B1 -->
  <rect x="80" y="220" width="80" height="35" rx="4" class="node" stroke="#4f46e5" stroke-width="1"/>
  <text x="120" y="242" text-anchor="middle" class="hashlabel">H₁</text>
  
  <!-- H2 from A2, C1 -->
  <rect x="220" y="220" width="80" height="35" rx="4" class="node" stroke="#4f46e5" stroke-width="1"/>
  <text x="260" y="242" text-anchor="middle" class="hashlabel">H₂</text>
  
  <!-- H3 from B2, A3 -->
  <rect x="360" y="220" width="80" height="35" rx="4" class="node" stroke="#4f46e5" stroke-width="1"/>
  <text x="400" y="242" text-anchor="middle" class="hashlabel">H₃</text>
  
  <!-- Continuation -->
  <text x="480" y="242" font-family="Arial, sans-serif" font-size="18" fill="#888">⋯</text>
  
  <!-- Level 2 hashes -->
  <!-- H4 from H1, H2 -->
  <rect x="150" y="130" width="80" height="35" rx="4" class="node" stroke="#4f46e5" stroke-width="1"/>
  <text x="190" y="152" text-anchor="middle" class="hashlabel">H₄</text>
  
  <!-- H5 from H3, ... -->
  <rect x="290" y="130" width="80" height="35" rx="4" class="node" stroke="#4f46e5" stroke-width="1"/>
  <text x="330" y="152" text-anchor="middle" class="hashlabel">H₅</text>
  
  <!-- Continuation -->
  <text x="390" y="152" font-family="Arial, sans-serif" font-size="18" fill="#888">⋯</text>
  
  <!-- Root hash -->
  <rect x="200" y="50" width="120" height="40" rx="6" class="root" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="75" text-anchor="middle" class="rootlabel">Root Hash</text>
  
  <!-- Arrows from entries to level 1 -->
  <line x1="90" y1="320" x2="110" y2="255" stroke="#888" stroke-width="1.5"/>
  <line x1="170" y1="320" x2="130" y2="255" stroke="#888" stroke-width="1.5"/>
  
  <line x1="250" y1="320" x2="250" y2="255" stroke="#888" stroke-width="1.5"/>
  <line x1="330" y1="320" x2="270" y2="255" stroke="#888" stroke-width="1.5"/>
  
  <line x1="410" y1="320" x2="390" y2="255" stroke="#888" stroke-width="1.5"/>
  <line x1="490" y1="320" x2="410" y2="255" stroke="#888" stroke-width="1.5"/>
  
  <!-- Arrows from level 1 to level 2 -->
  <line x1="120" y1="220" x2="180" y2="165" stroke="#888" stroke-width="1.5"/>
  <line x1="260" y1="220" x2="200" y2="165" stroke="#888" stroke-width="1.5"/>
  
  <line x1="400" y1="220" x2="320" y2="165" stroke="#888" stroke-width="1.5"/>
  
  <!-- Arrows from level 2 to root -->
  <line x1="190" y1="130" x2="240" y2="90" stroke="#888" stroke-width="1.5"/>
  <line x1="330" y1="130" x2="280" y2="90" stroke="#888" stroke-width="1.5"/>
  
  <!-- Legend -->
  <g transform="translate(580, 200)">
    <rect x="0" y="0" width="180" height="130" rx="6" fill="#f8f9fa" stroke="#e0e0e0"/>
    <text x="90" y="22" text-anchor="middle" class="subtitle" font-weight="600">Legend</text>
    
    <rect x="15" y="35" width="30" height="18" rx="2" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
    <text x="55" y="48" class="subtitle" font-size="10">Actor A entries</text>
    
    <rect x="15" y="58" width="30" height="18" rx="2" class="actorB" stroke="#059669" stroke-width="1"/>
    <text x="55" y="71" class="subtitle" font-size="10">Actor B entries</text>
    
    <rect x="15" y="81" width="30" height="18" rx="2" class="actorC" stroke="#ea580c" stroke-width="1"/>
    <text x="55" y="94" class="subtitle" font-size="10">Actor C entries</text>
    
    <rect x="15" y="104" width="30" height="18" rx="2" class="node" stroke="#4f46e5" stroke-width="1"/>
    <text x="55" y="117" class="subtitle" font-size="10">Hash nodes</text>
  </g>
  
  <!-- Caption -->
  <text x="400" y="385" text-anchor="middle" class="subtitle">Entries from multiple actors are interleaved and aggregated into a single Merkle root.</text>
</svg>