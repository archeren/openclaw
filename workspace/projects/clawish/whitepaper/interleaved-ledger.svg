<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #333; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #fff; font-weight: 600; }
      .smalllabel { font-family: monospace; font-size: 10px; fill: #fff; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #666; }
      .actorA { fill: #4a90d9; }
      .actorB { fill: #6b8e23; }
      .actorC { fill: #d9704a; }
    </style>
    <marker id="linkArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Multi-Actor Interleaved Ledger</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Physical storage with prev_hash references</text>
  
  <!-- Header row -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="100" height="30" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1"/>
    <text x="50" y="20" text-anchor="middle" class="subtitle" font-weight="600">Position</text>
    
    <rect x="100" y="0" width="120" height="30" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1"/>
    <text x="160" y="20" text-anchor="middle" class="subtitle" font-weight="600">Actor</text>
    
    <rect x="220" y="0" width="120" height="30" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1"/>
    <text x="280" y="20" text-anchor="middle" class="subtitle" font-weight="600">Entry</text>
    
    <rect x="340" y="0" width="140" height="30" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1"/>
    <text x="410" y="20" text-anchor="middle" class="subtitle" font-weight="600">Hash</text>
    
    <rect x="480" y="0" width="180" height="30" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1"/>
    <text x="570" y="20" text-anchor="middle" class="subtitle" font-weight="600">prev_hash Reference</text>
  </g>
  
  <!-- Row 1: Actor A, Entry 1 -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="100" height="35" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" class="subtitle" font-weight="600">1</text>
    
    <rect x="100" y="0" width="120" height="35" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" class="label">Actor A</text>
    
    <rect x="220" y="0" width="120" height="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="1"/>
    <text x="280" y="22" text-anchor="middle" class="smalllabel">Entry 1</text>
    
    <rect x="340" y="0" width="140" height="35" fill="#4a90d9" stroke="#2c5aa0" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="smalllabel">hash_A1</text>
    
    <rect x="480" y="0" width="180" height="35" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="570" y="22" text-anchor="middle" class="subtitle" font-style="italic">null (genesis)</text>
  </g>
  
  <!-- Row 2: Actor B, Entry 1 -->
  <g transform="translate(50, 135)">
    <rect x="0" y="0" width="100" height="35" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" class="subtitle" font-weight="600">2</text>
    
    <rect x="100" y="0" width="120" height="35" class="actorB" stroke="#556b2f" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" class="label">Actor B</text>
    
    <rect x="220" y="0" width="120" height="35" fill="#8fbc8f" stroke="#6b8e23" stroke-width="1"/>
    <text x="280" y="22" text-anchor="middle" class="smalllabel">Entry 1</text>
    
    <rect x="340" y="0" width="140" height="35" fill="#6b8e23" stroke="#556b2f" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="smalllabel">hash_B1</text>
    
    <rect x="480" y="0" width="180" height="35" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="570" y="22" text-anchor="middle" class="subtitle" font-style="italic">null (genesis)</text>
  </g>
  
  <!-- Row 3: Actor A, Entry 2 -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="100" height="35" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" class="subtitle" font-weight="600">3</text>
    
    <rect x="100" y="0" width="120" height="35" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" class="label">Actor A</text>
    
    <rect x="220" y="0" width="120" height="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="1"/>
    <text x="280" y="22" text-anchor="middle" class="smalllabel">Entry 2</text>
    
    <rect x="340" y="0" width="140" height="35" fill="#4a90d9" stroke="#2c5aa0" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="smalllabel">hash_A2</text>
    
    <rect x="480" y="0" width="180" height="35" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="570" y="22" text-anchor="middle" class="smalllabel" font-weight="600">hash_A1</text>
    
    <!-- Arrow from prev_hash to hash_A1 -->
    <line x1="540" y1="22" x2="495" y2="22" stroke="#888" stroke-width="2" marker-end="url(#linkArrow)"/>
  </g>
  
  <!-- Row 4: Actor C, Entry 1 -->
  <g transform="translate(50, 205)">
    <rect x="0" y="0" width="100" height="35" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" class="subtitle" font-weight="600">4</text>
    
    <rect x="100" y="0" width="120" height="35" class="actorC" stroke="#a0502c" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" class="label">Actor C</text>
    
    <rect x="220" y="0" width="120" height="35" fill="#e4a07e" stroke="#d9704a" stroke-width="1"/>
    <text x="280" y="22" text-anchor="middle" class="smalllabel">Entry 1</text>
    
    <rect x="340" y="0" width="140" height="35" fill="#d9704a" stroke="#a0502c" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="smalllabel">hash_C1</text>
    
    <rect x="480" y="0" width="180" height="35" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="570" y="22" text-anchor="middle" class="subtitle" font-style="italic">null (genesis)</text>
  </g>
  
  <!-- Row 5: Actor B, Entry 2 -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="100" height="35" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" class="subtitle" font-weight="600">5</text>
    
    <rect x="100" y="0" width="120" height="35" class="actorB" stroke="#556b2f" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" class="label">Actor B</text>
    
    <rect x="220" y="0" width="120" height="35" fill="#8fbc8f" stroke="#6b8e23" stroke-width="1"/>
    <text x="280" y="22" text-anchor="middle" class="smalllabel">Entry 2</text>
    
    <rect x="340" y="0" width="140" height="35" fill="#6b8e23" stroke="#556b2f" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="smalllabel">hash_B2</text>
    
    <rect x="480" y="0" width="180" height="35" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="570" y="22" text-anchor="middle" class="smalllabel" font-weight="600">hash_B1</text>
    
    <!-- Arrow from prev_hash to hash_B1 -->
    <line x1="540" y1="22" x2="495" y2="-113" stroke="#888" stroke-width="2" marker-end="url(#linkArrow)"/>
  </g>
  
  <!-- Row 6: Actor A, Entry 3 -->
  <g transform="translate(50, 275)">
    <rect x="0" y="0" width="100" height="35" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" class="subtitle" font-weight="600">6</text>
    
    <rect x="100" y="0" width="120" height="35" class="actorA" stroke="#2c5aa0" stroke-width="1"/>
    <text x="160" y="22" text-anchor="middle" class="label">Actor A</text>
    
    <rect x="220" y="0" width="120" height="35" fill="#7eb8e4" stroke="#4a90d9" stroke-width="1"/>
    <text x="280" y="22" text-anchor="middle" class="smalllabel">Entry 3</text>
    
    <rect x="340" y="0" width="140" height="35" fill="#4a90d9" stroke="#2c5aa0" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="smalllabel">hash_A3</text>
    
    <rect x="480" y="0" width="180" height="35" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="570" y="22" text-anchor="middle" class="smalllabel" font-weight="600">hash_A2</text>
    
    <!-- Arrow from prev_hash to hash_A2 -->
    <line x1="540" y1="22" x2="495" y2="-113" stroke="#888" stroke-width="2" marker-end="url(#linkArrow)"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 330)">
    <rect x="0" y="0" width="800" height="40" rx="6" fill="#f8f9fa" stroke="#e0e0e0"/>
    <text x="20" y="25" class="subtitle" font-weight="600">Key insight:</text>
    <text x="110" y="25" class="subtitle">prev_hash points to same actor's previous entry (not physically previous row).</text>
    <text x="20" y="45" class="subtitle" font-style="italic">Storage: Each entry stores prev_hash for fast chain reconstruction.</text>
  </g>
</svg>
