<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #333; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #1a5276; font-weight: 600; }
      .datalabel { font-family: monospace; font-size: 11px; fill: #fff; }
      .hashlabel { font-family: monospace; font-size: 10px; fill: #fff; }
      .hashnum { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #fff; font-weight: 600; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Per-Actor Ledger Hash Chain</text>
  
  <!-- Entry 1 -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="#f0f7ff" stroke="#4a90d9" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" class="label">Entry 1</text>
    <rect x="15" y="40" width="190" height="28" rx="4" fill="#7eb8e4" stroke="#4a90d9" stroke-width="1"/>
    <text x="110" y="59" text-anchor="middle" class="datalabel">data: identity.created</text>
    <rect x="15" y="75" width="190" height="32" rx="4" fill="#4a90d9" stroke="#2c5aa0" stroke-width="1"/>
    <text x="110" y="96" text-anchor="middle" class="hashlabel"><tspan class="hashnum">hash 1</tspan>: H(data₁)</text>
  </g>
  
  <!-- Arrow 1→2 -->
  <line x1="280" y1="110" x2="340" y2="110" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Entry 2 -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="#f0f7ff" stroke="#4a90d9" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" class="label">Entry 2</text>
    <rect x="15" y="40" width="190" height="28" rx="4" fill="#7eb8e4" stroke="#4a90d9" stroke-width="1"/>
    <text x="110" y="59" text-anchor="middle" class="datalabel">data: key.added</text>
    <rect x="15" y="75" width="190" height="32" rx="4" fill="#4a90d9" stroke="#2c5aa0" stroke-width="1"/>
    <text x="110" y="96" text-anchor="middle" class="hashlabel"><tspan class="hashnum">hash 2</tspan>: H(data₂ + hash 1)</text>
  </g>
  
  <!-- Arrow 2→3 -->
  <line x1="580" y1="110" x2="640" y2="110" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Entry 3 -->
  <g transform="translate(650, 50)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="#f0f7ff" stroke="#4a90d9" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" class="label">Entry 3</text>
    <rect x="15" y="40" width="190" height="28" rx="4" fill="#7eb8e4" stroke="#4a90d9" stroke-width="1"/>
    <text x="110" y="59" text-anchor="middle" class="datalabel">data: profile.updated</text>
    <rect x="15" y="75" width="190" height="32" rx="4" fill="#4a90d9" stroke="#2c5aa0" stroke-width="1"/>
    <text x="110" y="96" text-anchor="middle" class="hashlabel"><tspan class="hashnum">hash 3</tspan>: H(data₃ + hash 2)</text>
  </g>
  
  <!-- Chain continuation (vertically centered with arrows at y=110) -->
  <g transform="translate(880, 110)">
    <text font-family="Arial, sans-serif" font-size="20" fill="#888" dominant-baseline="middle">⋯</text>
  </g>
  
  <!-- Caption -->
  <g transform="translate(50, 190)">
    <text x="0" y="0" class="subtitle" font-style="italic">Each entry's hash embeds the previous entry's hash, creating an unbreakable chain.</text>
  </g>
</svg>
