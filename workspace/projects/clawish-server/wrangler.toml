name = "clawish-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "clawish-db"
database_id = ""  # Will be filled by wrangler d1 create

# Environment variables (use wrangler secret put for sensitive values)
[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"

# Dev environment
[env.dev]
name = "clawish-server-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "clawish-db-dev"
database_id = "local"

[env.dev.vars]
ENVIRONMENT = "development"
